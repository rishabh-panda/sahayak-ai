kind = "web"
previewPath = "/"
title = "SaathiCare"
version = "1.0.0"
id = "artifacts/saathi-care"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 18983

[services.development]
run = "pnpm --filter @workspace/saathi-care run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/saathi-care", "run", "build" ]
publicDir = "artifacts/saathi-care/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "18983"
BASE_PATH = "/"
